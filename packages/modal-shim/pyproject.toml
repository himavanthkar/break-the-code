[project]
name = "codebreaker-modal-shim"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
  "codebreaker-shim-shared",
  "fastapi>=0.115.0",
  "modal>=0.67.0",
  "pydantic>=2.9.2",
]

[tool.pyright]
pythonVersion = "3.12"
include = ["src"]

[tool.ruff]
line-length = 100
target-version = "py312"
